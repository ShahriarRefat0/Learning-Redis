name: Deploy on render
on: 
    workflow_run:
        workflows: ["Code quality test"]
        types:
            - completed

jobs:
    deploy:
        if: ${{ github.event.workflow_run.conclusion == 'success'}}

        runs-on: ubuntu-latest

        steps:
            - name: Trigger deployment on render
              run: |
                curl -X POST ${{secrets.RENDER_DEPLOY_HOOK_URL}}
              